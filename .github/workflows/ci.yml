# GitHub Actions workflow for Enterprise CI/CD Pipeline with Manual Approval
name: CI/CD Production Pipeline

# Trigger the workflow only on push or pull request to main and master branches
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: SuperSecurePassword_2026!
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask psycopg2-binary prometheus_client requests pytest pytest-cov ruff bandit

    - name: Run Linting Check (Ruff)
      run: |
        ruff check app/

    - name: Run Security Analysis (Bandit)
      run: |
        bandit -r app/ -ll

    - name: Run Code Syntax Check
      run: |
        python -m py_compile app/app.py

    - name: Run Application Tests with Coverage
      env:
        DB_USER: app
        DB_PASSWORD: SuperSecurePassword_2026!
        DB_NAME: app
        DB_HOST: localhost
      run: |
        if [ -d "tests" ]; then
          pytest --cov=app/
        else
          echo "No tests directory found. Skipping extended unit tests."
        fi

    - name: Verify Docker Image Build
      run: |
        docker build -t company-api-image:latest .

  deploy:
    needs: test-and-build
    runs-on: self-hosted
    # Only allow deployment on hard pushes to release branches, not on Pull Requests
    if: github.event_name == 'push'
    # Bind this job to the GitHub protected environment for human sign-off
    environment: production

    steps:
    - name: Check Directory and Sync Code
      run: |
        cd ~/python-api-docker
        git fetch --all
        git reset --hard origin/${{ github.ref_name }}

    - name: Launch Container Stack
      run: |
        cd ~/python-api-docker
        docker compose up --build --force-recreate -d
