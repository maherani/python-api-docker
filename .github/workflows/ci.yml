# GitHub Actions workflow for Python API Continuous Integration
name: CI Production Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: SuperSecurePassword_2026!
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    # Step 1: Fetch the latest source code from the repository
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Initialize the official Python environment on the runner
    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Upgrade pip and install core, testing, and security scanning dependencies
    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask psycopg2-binary prometheus_client requests pytest pytest-cov ruff bandit

    # Step 4: Run Ruff to check code style, formatting, and potential Python bugs
    - name: Run Linting Check (Ruff)
      run: |
        ruff check app/

    # Step 5: Scan Python code for security vulnerabilities using Bandit
    - name: Run Security Analysis (Bandit)
      run: |
        bandit -r app/ -ll

    # Step 6: Perform a static syntax check using the correct relative path
    - name: Run Code Syntax Check
      run: |
        python -m py_compile app/app.py

    # Step 7: Execute unit tests with coverage tracking
    - name: Run Application Tests with Coverage
      env:
        DB_USER: app
        DB_PASSWORD: SuperSecurePassword_2026!
        DB_NAME: app
        DB_HOST: localhost
      run: |
        if [ -d "tests" ]; then
          pytest --cov=app/
        else
          echo "No tests directory found. Skipping extended unit tests."
        fi

    # Step 8: Test the local Dockerfile compilation process without pushing to registry
    - name: Verify Docker Image Build
      run: |
        docker build -t company-api-image:latest .
