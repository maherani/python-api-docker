name: CI/CD Production Pipeline

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask psycopg2-binary prometheus_client requests pytest pytest-cov ruff bandit

    - name: Run Linting Check (Ruff)
      run: ruff check app/

    - name: Run Security Analysis (Bandit)
      run: bandit -r app/ -ll

    - name: Run Code Syntax Check
      run: python -m py_compile app/app.py

    - name: Run Application Tests with Coverage
      env:
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_HOST: localhost
      run: |
        if [ -d "tests" ]; then pytest --cov=app/; else echo "No tests found."; fi

    - name: Verify Docker Image Build
      run: docker build -t company-api-image:latest .

  deploy:
    needs: test-and-build
    runs-on: self-hosted
    if: github.ref_name == 'production'

    steps:
    - name: Check Directory and Sync Code
      run: |
        cd ~/python-api-docker
        git fetch --all
        git reset --hard origin/production

    - name: Launch Container Stack
      run: |
        cd ~/python-api-docker
        docker compose up --build --force-recreate -d
