---
- name: Setup Docker and Infrastructure Environment
  hosts: webservers
  become: yes
  tasks:

    - name: Update apt repo and cache
      apt:
        update_cache: yes
      ignore_errors: yes
    - name: Install required system packages
      apt:
        name:
          - curl
          - git
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Ensure Docker directory exists
      file:
        path: /etc/docker
        state: directory
        mode: '0755'

    - name: Verify Docker installation
      command: docker --version
      register: docker_check
      ignore_errors: yes

    - name: Print Docker version if installed
      debug:
        msg: "{{ docker_check.stdout }}"
      when: docker_check.rc == 0
