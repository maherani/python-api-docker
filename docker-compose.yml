version: "3.9"

services:
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust   # <--- این خط کلیدی را اضافه کن
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network

# Backend Python API
  app:
    image: maheranii/python-api-docker:v1
    restart: always
    environment:
      - PORT=5000
      - FLASK_RUN_HOST=0.0.0.0
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    # Health check to ensure zero-downtime updates
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Deploy policy for rolling updates
    deploy:
      replicas: 2
      update_config:
        parallelism: 1      # Update one container at a time
        delay: 5s           # Wait 5s before updating the next
        order: start-first  # Start new container before stopping old one
    networks:
      - app_network

# Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: reverse_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network

# Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    user: "65534:65534"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_rules:/etc/prometheus/rules
      - ./prometheus_data:/prometheus
    depends_on:
      - app
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - app_network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    networks:
      - app_network

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    ports:
      - "3100:3100"
    volumes:
      - ./loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app_network

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --storage.path=/tmp/alloy-data /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - app_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    command: --web.listen-address=:9187
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"
    ports:
      - "0.0.0.0:9187:9187"
    networks:
      - app_network

volumes:
  db_data:
  grafana_data:

networks:
  app_network:
    driver: bridge
