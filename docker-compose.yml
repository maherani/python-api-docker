version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx

    depends_on:
      - api

    restart: unless-stopped

    networks:
      - appnet

  api:
    build: .

    container_name: python_api

    expose:
      - "5000"

    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - appnet

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: testdb

    restart: unless-stopped

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - appnet

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
  nginx_logs:
